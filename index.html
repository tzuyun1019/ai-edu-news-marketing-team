<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育 AI 情報 · 快讀版</title>
  <style>
    /* ── Morandi Palette ── */
    :root {
      --cream:       #F5F0EB;
      --warm-white:  #FAF7F4;
      --dusty-blue:  #8BA3B4;
      --blue-light:  #B8CEDB;
      --blue-hover:  #7A93A5;
      --sage:        #9CAF8B;
      --sage-dark:   #7A8F7A;
      --terracotta:  #C4937A;
      --warm-brown:  #5C4A3D;
      --tan:         #8B7355;
      --beige:       #D4C5B0;
      --border:      #E2D8CE;
      --text-main:   #3D3028;
      --text-sub:    #7A6A5A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans TC', 'PingFang TC', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .site-header {
      background: var(--dusty-blue);
      color: #fff;
      padding: 14px 24px;
      flex-shrink: 0;
    }
    .site-header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .02em; }
    .site-header h1 em { font-style: normal; font-weight: 400; opacity: .75; font-size: .88em; }
    .site-header .meta { font-size: .72rem; color: var(--blue-light); margin-top: 3px; }

    /* ── Day Tabs ── */
    .day-tabs {
      display: flex;
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      padding: 0 16px;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 8px 14px 6px;
      font-size: .75rem;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      white-space: nowrap;
      color: var(--text-sub);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      transition: color .15s;
    }
    .tab .tab-dow  { font-weight: 600; font-size: .78rem; }
    .tab .tab-date { font-size: .68rem; }
    .tab.active    { border-bottom-color: var(--dusty-blue); color: var(--dusty-blue); }
    .tab.empty     { color: var(--beige); cursor: default; }
    .tab-today {
      font-size: .58rem;
      background: var(--terracotta);
      color: #fff;
      border-radius: 8px;
      padding: 1px 5px;
      margin-top: 1px;
    }

    /* ── Pane container ── */
    #panesContainer { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .day-pane       { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .day-pane[hidden]{ display: none; }

    /* ── Split layout ── */
    .split {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left: News List ── */
    .news-list {
      width: 38%;
      min-width: 240px;
      max-width: 360px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: var(--warm-white);
      flex-shrink: 0;
    }
    .section-label {
      font-size: .65rem;
      font-weight: 700;
      color: var(--sage-dark);
      padding: 10px 14px 4px;
      letter-spacing: .06em;
      border-top: 1px solid var(--border);
    }
    .section-label:first-child { border-top: none; }

    .news-item {
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .news-item:hover  { background: #EEE8E1; }
    .news-item.active { background: #E5EDF4; border-left: 3px solid var(--dusty-blue); padding-left: 11px; }

    .tag {
      font-size: .6rem;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .tag-product  { background: #DDE8F0; color: #3E6E8A; }
    .tag-funding  { background: #EDE8D6; color: #7A5E20; }
    .tag-partner  { background: #E4EBE0; color: #426842; }
    .tag-research { background: #E6E2EE; color: #5E4E82; }
    .tag-market   { background: #EEE6DE; color: #7A4E2E; }
    .tag-taiwan   { background: #EEDEDE; color: #7A2E2E; }

    .item-text { min-width: 0; }
    .item-title  { font-size: .82rem; line-height: 1.45; font-weight: 500; color: var(--text-main); }
    .item-source { font-size: .67rem; color: var(--tan); margin-top: 3px; }

    .list-empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--beige);
      font-size: .82rem;
      line-height: 1.7;
    }

    /* ── Right: Detail Panel ── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px;
      background: var(--cream);
    }

    .detail-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--beige);
      gap: 10px;
    }
    .detail-empty p { font-size: .82rem; }

    .detail-tag { display: inline-block; font-size: .68rem; font-weight: 700; padding: 3px 8px; border-radius: 3px; margin-bottom: 12px; }
    .detail-title { font-size: 1.18rem; font-weight: 700; color: var(--warm-brown); line-height: 1.55; margin-bottom: 18px; }
    .detail-body p { font-size: .875rem; line-height: 1.85; color: var(--text-main); margin-bottom: 14px; }

    .takeaway {
      background: var(--warm-white);
      border-left: 3px solid var(--sage);
      border-radius: 0 6px 6px 0;
      padding: 14px 16px;
      margin: 18px 0 20px;
    }
    .takeaway-label {
      display: block;
      font-size: .67rem;
      font-weight: 700;
      color: var(--sage-dark);
      letter-spacing: .05em;
      margin-bottom: 6px;
    }
    .takeaway p { font-size: .83rem; line-height: 1.78; color: var(--tan); }

    .source-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--dusty-blue);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: .82rem;
      font-weight: 600;
      transition: background .15s;
    }
    .source-btn:hover { background: var(--blue-hover); }
    .source-caption { font-size: .67rem; color: var(--tan); margin-top: 8px; }

    /* ── Footer ── */
    .site-footer {
      font-size: .68rem;
      color: var(--tan);
      text-align: center;
      padding: 8px 16px;
      background: var(--warm-white);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .split { flex-direction: column; }
      .news-list { width: 100%; max-width: none; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); max-height: 44vh; }
      .detail-panel { padding: 16px 18px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>📰 教育 AI 情報 <em>快讀版</em></h1>
  <div class="meta">每日清晨 7:00 自動更新（台北時間）· 全球教育 AI 應用動態</div>
</header>

<nav class="day-tabs" id="dayTabs">
  <!-- Populated by daily agent -->
  <div class="tab empty" data-day=""><span class="tab-dow">週一</span><span class="tab-date">–</span></div>
  <div class="tab empty" data-day=""><span class="tab-dow">週二</span><span class="tab-date">–</span></div>
  <div class="tab empty" data-day=""><span class="tab-dow">週三</span><span class="tab-date">–</span></div>
  <div class="tab empty" data-day=""><span class="tab-dow">週四</span><span class="tab-date">–</span></div>
  <div class="tab empty" data-day=""><span class="tab-dow">週五</span><span class="tab-date">–</span></div>
  <div class="tab empty" data-day=""><span class="tab-dow">週六</span><span class="tab-date">–</span></div>
  <div class="tab empty" data-day=""><span class="tab-dow">週日</span><span class="tab-date">–</span></div>
</nav>

<div id="panesContainer">

  <!-- Empty placeholder for future dates -->
  <section class="day-pane" id="emptyPane" hidden>
    <div class="split">
      <aside class="news-list"><div class="list-empty">尚無當日情報</div></aside>
      <div class="detail-panel"><div class="detail-empty"><p>尚無當日情報</p></div></div>
    </div>
  </section>

</div><!-- /panesContainer -->

<footer class="site-footer">
  資料由 Claude 自動彙整於每日清晨 7:00（台北時間）　·
  最近更新：<span id="updated">尚未更新</span>
</footer>

<script>
/* ── Tab switching ───────────────────────────────────────────────────── */
(function () {
  const tabsEl = document.getElementById('dayTabs');
  const container = document.getElementById('panesContainer');

  tabsEl.addEventListener('click', function (e) {
    const tab = e.target.closest('.tab');
    if (!tab || tab.classList.contains('empty')) return;

    tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const day = tab.dataset.day;
    container.querySelectorAll('.day-pane:not(#emptyPane)').forEach(p => {
      if (p.dataset.day === day) p.removeAttribute('hidden');
      else p.setAttribute('hidden', '');
    });
  });
})();

/* ── News item click → detail panel ─────────────────────────────────── */
function selectNews(itemEl) {
  const pane = itemEl.closest('.day-pane');
  pane.querySelectorAll('.news-item').forEach(el => el.classList.remove('active'));
  itemEl.classList.add('active');

  const d = JSON.parse(itemEl.dataset.story);
  const panel = pane.querySelector('.detail-panel');
  panel.innerHTML = `
    <span class="detail-tag ${d.tagClass}">${d.section}</span>
    <h2 class="detail-title">${d.title}</h2>
    <div class="detail-body">
      <p>${d.para1}</p>
      <p>${d.para2}</p>
    </div>
    <div class="takeaway">
      <span class="takeaway-label">給 EdTech 產品團隊的啟示</span>
      <p>${d.takeaway}</p>
    </div>
    <a class="source-btn" href="${d.sourceUrl}" target="_blank" rel="noopener">前往原文 →</a>
    <div class="source-caption">來源：${d.sourceName}</div>
  `;
  panel.scrollTop = 0;
}
</script>
</body>
</html>
