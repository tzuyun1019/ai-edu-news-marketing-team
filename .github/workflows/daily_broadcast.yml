name: 每日 LINE 快讀版廣播

on:
  schedule:
    # 每天 23:30 UTC = 台北時間 07:30，在主 routine (07:00) 跑完後廣播
    - cron: "30 23 * * *"
  workflow_dispatch:  # 允許手動觸發

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 廣播今日快讀版
        run: python broadcast_from_site.py

