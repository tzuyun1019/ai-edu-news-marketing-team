name: Daily LINE Broadcast

on:
  push:
    branches: [main]
    paths: [index.html]
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    # Backfill（補舊資料）的 commit 不觸發廣播，避免重複推播
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'Backfill') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run broadcast script
        env:
          LINE_TOKEN_QUICK: ${{ secrets.LINE_TOKEN_QUICK }}
        run: python3 broadcast_daily.py
