name: Daily LINE Broadcast (07:30 Taipei)

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run broadcast script
        env:
          LINE_TOKEN_QUICK: ${{ secrets.LINE_TOKEN_QUICK }}
        run: python3 broadcast_daily.py
