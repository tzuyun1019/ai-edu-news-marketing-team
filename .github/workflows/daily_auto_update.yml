name: Daily News Watchdog

on:
  schedule:
    - cron: '40 23 * * *'   # 7:40 AM Taipei — CCR 主流程 7:00 跑完後檢查
    - cron: '0 1 * * *'     # 9:00 AM Taipei — 第二次保險
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install feedparser
      - name: Watchdog check and update if needed
        run: python .github/scripts/auto_news.py
      - name: Commit and push
        run: |
          git config user.email "tzuyun@ischool.com.tw"
          git config user.name "auto-news-bot"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes (CCR succeeded or watchdog skipped)"
          else
            TODAY=$(TZ=Asia/Taipei date '+%Y-%m-%d')
            git commit -m "Daily update: ${TODAY} - watchdog fallback"
            git push
            echo "✅ Watchdog pushed fallback content"
          fi
