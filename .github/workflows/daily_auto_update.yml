name: Daily News Watchdog

on:
  schedule:
    # GitHub 排程有嚴重延遲（實測可達 4 小時），多排幾班增加命中率
    # 已有今日內容時 auto_news.py 會直接跳過，多跑無害
    - cron: '10 23 * * *'   # 7:10 AM Taipei
    - cron: '40 23 * * *'   # 7:40 AM Taipei
    - cron: '25 0 * * *'    # 8:25 AM Taipei
    - cron: '15 1 * * *'    # 9:15 AM Taipei
    - cron: '5 2 * * *'     # 10:05 AM Taipei
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install feedparser
      - name: Watchdog check and update if needed
        run: python .github/scripts/auto_news.py
      - name: Commit and push
        run: |
          git config user.email "tzuyun@ischool.com.tw"
          git config user.name "auto-news-bot"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes (CCR succeeded or watchdog skipped)"
          else
            TODAY=$(TZ=Asia/Taipei date '+%Y-%m-%d')
            git commit -m "Daily update: ${TODAY} - watchdog fallback"
            git push
            echo "✅ Watchdog pushed fallback content"
          fi
